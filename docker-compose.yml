services:
  rocketchat:
    image: registry.rocket.chat/rocketchat/rocket.chat:8.4.0
    container_name: rocketchat
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      ROOT_URL: http://localhost:3000
      PORT: 3000

      # For MongoDB running on your host machine:
      MONGO_URL: mongodb://${MONGO_HOST:-host.docker.internal}:27017/rocketchat?replicaSet=rs0

    extra_hosts:
      - "host.docker.internal:host-gateway"
